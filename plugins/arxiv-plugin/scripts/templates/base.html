<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ArXiv Report{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .collapse-toggle { cursor: pointer; user-select: none; }
    .collapse-content { display: none; }
    .collapse-content.open { display: block; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen {% block body_class %}{% endblock %}">
  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-800">{% block header %}ArXiv Plugin{% endblock %}</h1>
      <span class="text-sm text-gray-500">{% block header_right %}{% endblock %}</span>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t border-gray-200 mt-12 py-6 text-center text-xs text-gray-400">
    Generated by arxiv-plugin &middot; {% block footer_date %}{{ date | default("") }}{% endblock %}
  </footer>
  <script>
    document.querySelectorAll('.collapse-toggle').forEach(el => {
      el.addEventListener('click', () => {
        const target = document.getElementById(el.dataset.target);
        if (target) target.classList.toggle('open');
      });
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
